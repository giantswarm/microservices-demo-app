{{- if .Values.frontend.create }}
{{- if .Values.httproute.enabled }}
{{ range $i := until (.Values.httproute.namespaces.number | int) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.Values.frontend.name }}-{{ $i }}
  namespace: loadtesting-{{ $i }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-{{ $i }}
      namespace: loadtesting-{{ $i }}
  hostnames:
    - "{{ $.Values.httproute.hostname }}.loadtesting-{{ $i }}.{{ $.Values.httproute.base }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ $.Values.frontend.name }}
          namespace: {{ $.Release.Namespace }}
          port: 80
{{- end }}
{{- end }}
{{- end }}
