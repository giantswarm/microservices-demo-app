{{- if .Values.frontend.create }}
{{- if .Values.httproute.enabled }}
{{ range $i := until (.Values.httproute.namespaces.number | int) }}
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  annotations:
    giantswarm.io/external-dns: managed
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-4"
  labels:
    application.giantswarm.io/team: cabbage
  name: gateway-{{ $i }}-https
  namespace: loadtesting-{{ $i }}
spec:
  endpoints:
  - dnsName: onlineboutique.loadtesting-{{ $i }}.{{ $.Values.httproute.base }}
    recordTTL: 300
    recordType: CNAME
    targets:
    - gateway.{{ $.Values.httproute.base }}
{{- end }}
{{- end }}
{{- end }}
