{{- if .Values.frontend.create }}
{{- if .Values.httproute.enabled }}
{{ range $i := until (.Values.httproute.namespaces.number | int) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    application.giantswarm.io/team: cabbage
  name: gateway-{{ $i }}
  namespace: loadtesting-{{ $i }}
spec:
  gatewayClassName: giantswarm-default
  infrastructure:
    {{- if $.Values.httproute.envoyProxy.enabled }}
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: gateway-{{ $i }}
    {{- else }}
    annotations:
      giantswarm.io/external-dns: managed
    {{- end }}
  listeners:
  # - allowedRoutes:
  #     namespaces:
  #       from: All
  #   hostname: '*.loadtesting-{{ $i }}.{{ $.Values.httproute.base }}'                                                                                                                                                                                   
  #   name: http                                                                                                                                                                                      
  #   port: 80                                                                                                                                                                                        
  #   protocol: HTTP
  - allowedRoutes:
      namespaces:
        from: All
    hostname: '*.loadtesting-{{ $i }}.{{ $.Values.httproute.base }}'
    name: https
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - group: ""
        kind: Secret
        name: gateway-{{ $i }}-https-tls
      mode: Terminate
{{- end }}
{{- end }}
{{- end }}
