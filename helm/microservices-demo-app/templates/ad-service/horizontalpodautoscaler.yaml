{{- if and .Values.adService.create .Values.adService.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.adService.name }}-hpa
  namespace: loadtesting
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.adService.name }}
  minReplicas: {{ .Values.adService.hpa.minReplicas | default 1 }}
  maxReplicas: {{ .Values.adService.hpa.maxReplicas | default 5 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.adService.hpa.targetCPUUtilizationPercentage | default 80 }}
{{- end }}
