{{- if and .Values.ingress.enabled .Values.ingress.customCertificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    application.giantswarm.io/team: cabbage
  name: {{ .Values.frontend.name }}-nginx-wildcard
  namespace: {{ .Release.Namespace }}
spec:
  dnsNames:
  - '*.{{ .Release.Namespace }}.{{ .Values.ingress.base }}'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-giantswarm
  secretName: nginx-ingress-wildcard-tls
{{- end }}

