{{- if .Values.frontend.create }}
{{- if .Values.ingress.enabled }}
{{ range $i := until (.Values.ingress.number | int) }}
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  annotations:
    giantswarm.io/external-dns: managed
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-4"
  labels:
    application.giantswarm.io/team: cabbage
  name: {{ $.Values.frontend.name }}-nginx-{{ $i }}
  namespace: {{ $.Release.Namespace }}
spec:
  endpoints:
  - dnsName: {{ $.Values.ingress.host }}-{{ $i }}.{{ $.Release.Namespace }}.{{ $.Values.ingress.base }}
    recordTTL: 300
    recordType: CNAME
    targets:
    - gateway.{{ $.Values.ingress.base }}
{{- end }}
{{- end }}
{{- end }}
