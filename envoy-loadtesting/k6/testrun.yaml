apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: envoy-gateway-load-test
  namespace: $(K6_NAMESPACE)
spec:
  parallelism: 4
  # Allows to have logs in the runner pods.
  quiet: "false"
  # k6-operator will clean up the generated resources after the test is completed.
  cleanup: 'post'
  script:
    configMap:
      name: envoy-load-testing-scenario
      file: test-scenario.js
  separate: false
  initializer:
    image: $(K6_IMAGE)
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      fsGroup: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  starter:
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      fsGroup: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  runner:
    image: $(K6_IMAGE)
    env:
      # Infrastructure — composed from shared WC + BASE_DOMAIN
      - name: ENDPOINTS
        value: "$(ENDPOINTS)"
      - name: BASE_DOMAIN
        value: "$(WC).$(BASE_DOMAIN)"
      # Scenario timing & load shape
      - name: SCENARIO_DURATION_SECONDS
        value: "$(SCENARIO_DURATION_SECONDS)"
      - name: WAIT_BETWEEN_SCENARIOS
        value: "$(WAIT_BETWEEN_SCENARIOS)"
      - name: ARRIVAL_RATE
        value: "$(ARRIVAL_RATE)"
      - name: PRE_ALLOCATED_VUS
        value: "$(PRE_ALLOCATED_VUS)"
      - name: MAX_VUS
        value: "$(MAX_VUS)"
      - name: GRACEFUL_STOP
        value: "$(GRACEFUL_STOP)"
      # SLO thresholds (giantswarm/giantswarm#35147)
      - name: SLO_P95_LATENCY_MS
        value: "$(SLO_P95_LATENCY_MS)"
      - name: SLO_P99_LATENCY_MS
        value: "$(SLO_P99_LATENCY_MS)"
      - name: SLO_ERROR_RATE
        value: "$(SLO_ERROR_RATE)"
      - name: SLO_CHECKS_RATE
        value: "$(SLO_CHECKS_RATE)"
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      fsGroup: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
