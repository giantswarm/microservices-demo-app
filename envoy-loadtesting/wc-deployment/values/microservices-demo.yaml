ingress:
  enabled: ${INGRESS_NGINX_ENABLED}
  number: ${PUBLIC_ENDPOINTS}
  base: ${WC}.${BASE_DOMAIN}
  host: nginx-onlineboutique

kong:
  enabled: ${KONG_ENABLED}
  number: ${PUBLIC_ENDPOINTS}
  base: ${WC}.${BASE_DOMAIN}
  host: kong-onlineboutique
  ingressCname: kong-ingress.${WC}.${BASE_DOMAIN}

httproute:
  enabled: true
  base: ${WC}.${BASE_DOMAIN}
  hostname: onlineboutique
  namespaces:
    create: true
    number: ${PUBLIC_ENDPOINTS}

adService:
  resources:
    requests:
      cpu: 200m
      memory: 180Mi
    limits:
      cpu: 300m
      memory: 300Mi
  hpa:
    enabled: true
    minReplicas: ${HPA_MIN_REPLICAS}
    maxReplicas: ${HPA_MAX_REPLICAS}
    targetCPUUtilizationPercentage: 80

