apps:
  envoyGateway:
    enabled: true
    userConfig:
      configMap:
        values: |
          config:
            envoyGateway:
              gatewayAPI:
                enabled:
                  - XListenerSet
  gatewayApiConfig:
    enabled: true
    userConfig:
      configMap:
        values: |
          gateways:
            default:
              envoyProxy:
                enabled: false
              allowedListeners:
                enabled: true
                namespaces:
                  from: All
              listeners:
                http:
                  httpsRedirectEnabled: true
                  allowedRoutes:
                    namespaces:
                      from: All
                https:
                  subdomains:
                    - onlineboutique
  gatewayApiCrds:
    enabled: true
    userConfig:
      configMap:
        values: |
          install:
            xlistenersets: "experimental"
            gateways: "experimental"
clusterID: ${WC}
