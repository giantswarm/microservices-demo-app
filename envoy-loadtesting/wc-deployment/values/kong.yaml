ingressController:
  enabled: true
  createIngressClass: false
  watchNamespaces:
    - loadtesting
    - kong
  rbac:
    gatewayAPI:
      enabled: true
  ingressClass: none  # Prevents KIC from reconciling Ingress resources; Gateway API only
proxy:
  annotations:
    giantswarm.io/external-dns: managed
    external-dns.alpha.kubernetes.io/hostname: kong-ingress.${WC}.${BASE_DOMAIN}
extraObjects:
  - apiVersion: configuration.konghq.com/v1
    kind: KongClusterPlugin
    metadata:
      name: prometheus
      annotations:
        kubernetes.io/ingress.class: kong
      labels:
        global: "true"
    plugin: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
  - apiVersion: rbac.authorization.k8s.io/v1                                                                                                                                          
    kind: ClusterRole                                                                                                                                                                 
    metadata:                                                                                                                                                                         
      name: kong-app-kong-app-ingressclass-reader                                                                                                                                     
    rules:                                                                                                                                                                            
      - apiGroups: ["networking.k8s.io"]                                                                                                                                              
        resources: ["ingressclasses"]                                                                                                                                                 
        verbs: ["get", "list", "watch"]                                                                                                                                               
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding                
    metadata:                               
      name: kong-app-kong-app-ingressclass-reader                                         
    roleRef:                                                                                                                                                                          
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole                                                                                                                                                               
      name: kong-app-kong-app-ingressclass-reader
    subjects:                               
      - kind: ServiceAccount
        name: kong-app-kong-app
        namespace: kong
