apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This kustomization is built as part of the parent (envoy-loadtesting/).
# Placeholder values are resolved by the parent's replacements.
# Build from the parent: ./deploy.sh preview

# --- ConfigMaps (generated from value files) -----------------
configMapGenerator:
- name: CLUSTER-userconfig
  namespace: org-giantswarm
  files:
  - values=values/cluster-userconfig.yaml
  options:
    disableNameSuffixHash: true
    labels:
      giantswarm.io/cluster: CLUSTER

- name: CLUSTER-gateway-api-bundle
  namespace: org-giantswarm
  files:
  - values=values/gateway-api-bundle.yaml
  options:
    disableNameSuffixHash: true
    labels:
      app-operator.giantswarm.io/watching: "true"

- name: CLUSTER-aws-lb-controller-bundle-user-values
  namespace: org-giantswarm
  files:
  - values.yaml=values/aws-lb-controller.yaml
  options:
    disableNameSuffixHash: true
    labels:
      app-operator.giantswarm.io/watching: "true"

- name: CLUSTER-ingress-nginx-user-values
  namespace: org-giantswarm
  files:
  - values.yaml=values/ingress-nginx.yaml
  options:
    disableNameSuffixHash: true
    labels:
      app-operator.giantswarm.io/watching: "true"

- name: CLUSTER-kong-user-values
  namespace: org-giantswarm
  files:
  - values.yaml=values/kong.yaml
  options:
    disableNameSuffixHash: true
    labels:
      app-operator.giantswarm.io/watching: "true"

# --- App CRs -------------------------------------------------
resources:
- cluster.yaml
- additional-apps.yaml
- loadtesting-app.yaml
