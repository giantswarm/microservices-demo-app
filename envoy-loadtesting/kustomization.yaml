apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ============================================================
# Envoy Gateway Load Testing — Top-Level Kustomization
# ============================================================
# Configuration lives in config.env. Kustomize replacements inject
# values from the cluster-variables ConfigMap into resource fields.
# Values files (cluster-userconfig, gateway-api-bundle) use envsubst
# for embedded YAML — deploy.sh handles this preprocessing.
#
# Build via deploy.sh:    ./deploy.sh preview
# ============================================================

# --- Variables (not deployed, used as replacement source) ---
configMapGenerator:
- name: cluster-variables
  envs:
  - config.env
  options:
    disableNameSuffixHash: true
    annotations:
      config.kubernetes.io/local-config: "true"

# --- Sub-kustomizations ---
resources:
- wc-deployment
- k6

# --- Replacements: values sourced from config.env ---
replacements:

# RELEASE -> cluster App version
- source:
    kind: ConfigMap
    name: cluster-variables
    fieldPath: data.RELEASE
  targets:
  - select:
      kind: App
      name: CLUSTER
    fieldPaths:
    - spec.version

# BASE_DOMAIN -> TestRun env (second segment of "WC.BASE_DOMAIN")
- source:
    kind: ConfigMap
    name: cluster-variables
    fieldPath: data.BASE_DOMAIN
  targets:
  - select:
      kind: TestRun
      name: envoy-gateway-load-test
    fieldPaths:
    - spec.runner.env.[name=BASE_DOMAIN].value
    options:
      delimiter: '.'
      index: 1

# K6_NAMESPACE -> TestRun + scenario ConfigMap namespace
- source:
    kind: ConfigMap
    name: cluster-variables
    fieldPath: data.K6_NAMESPACE
  targets:
  - select:
      kind: TestRun
      name: envoy-gateway-load-test
    fieldPaths:
    - metadata.namespace
  - select:
      kind: ConfigMap
      name: envoy-load-testing-scenario
    fieldPaths:
    - metadata.namespace

# K6_IMAGE -> TestRun initializer + runner images
- source:
    kind: ConfigMap
    name: cluster-variables
    fieldPath: data.K6_IMAGE
  targets:
  - select:
      kind: TestRun
      name: envoy-gateway-load-test
    fieldPaths:
    - spec.initializer.image
    - spec.runner.image

# TEST_ID -> TestRun tag
- source:
    kind: ConfigMap
    name: cluster-variables
    fieldPath: data.TEST_ID
  targets:
  - select:
      kind: TestRun
      name: envoy-gateway-load-test
    fieldPaths:
    - spec.arguments
    options:
      delimiter: '='
      index: 1

# ENDPOINTS -> TestRun env
- source:
    kind: ConfigMap
    name: cluster-variables
    fieldPath: data.ENDPOINTS
  targets:
  - select:
      kind: TestRun
      name: envoy-gateway-load-test
    fieldPaths:
    - spec.runner.env.[name=ENDPOINTS].value

# PROXY_CONTROLLER -> TestRun env (selects nginx_simulation or kong_simulation)
- source:
    kind: ConfigMap
    name: cluster-variables
    fieldPath: data.PROXY_CONTROLLER
