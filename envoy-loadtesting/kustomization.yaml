# WC -> all cluster-prefixed names, labels, annotations, refs
# Delimiter '-' with index 0 replaces the CLUSTER prefix in compound
# names (e.g. CLUSTER-ingress-nginx -> elt-gerald-ingress-nginx) and
# works as a full replacement for bare CLUSTER values.
- source:
    kind: ConfigMap
    name: cluster-variables
    fieldPath: data.WC
  targets:
  # --- cluster App ---
  - select:
      kind: App
      name: CLUSTER
    fieldPaths:
    - metadata.name
    - spec.userConfig.configMap.name
    options:
      delimiter: '-'
      index: 0
  # --- gateway-api-bundle App ---
  - select:
      kind: App
      name: CLUSTER-gateway-api-bundle
    fieldPaths:
    - metadata.name
    - spec.config.configMap.name
    - spec.userConfig.configMap.name
    options:
      delimiter: '-'
      index: 0
  # --- aws-lb-controller-bundle App ---
  - select:
      kind: App
      name: CLUSTER-aws-lb-controller-bundle
    fieldPaths:
    - metadata.name
    - metadata.labels.[giantswarm.io/cluster]
    - metadata.annotations.[app-operator.giantswarm.io/depends-on]
    - spec.userConfig.configMap.name
    options:
      delimiter: '-'
      index: 0
  # --- ingress-nginx App ---
  - select:
      kind: App
      name: CLUSTER-ingress-nginx
    fieldPaths:
    - metadata.name
    - metadata.labels.[giantswarm.io/cluster]
    - metadata.annotations.[app-operator.giantswarm.io/depends-on]
    - spec.config.configMap.name
    - spec.kubeConfig.context.name
    - spec.kubeConfig.secret.name
    - spec.userConfig.configMap.name
    options:
      delimiter: '-'
      index: 0
  # --- kong-app App ---
  - select:
      kind: App
      name: CLUSTER-kong-app
    fieldPaths:
    - metadata.name
    - metadata.labels.[giantswarm.io/cluster]
    - spec.config.configMap.name
    - spec.kubeConfig.context.name
    - spec.kubeConfig.secret.name
    - spec.userConfig.configMap.name
    options:
      delimiter: '-'
      index: 0
  # --- microservices-demo-app OCIRepository ---
  - select:
      kind: OCIRepository
      name: CLUSTER-microservices-demo-app
    fieldPaths:
    - metadata.name
    options:
      delimiter: '-'
      index: 0
  # --- microservices-demo-app HelmRelease ---
  - select:
      kind: HelmRelease
      name: CLUSTER-microservices-demo-app
    fieldPaths:
    - metadata.name
    - metadata.labels.[giantswarm.io/cluster]
    - spec.chartRef.name
    - spec.kubeConfig.secretRef.name
    - spec.releaseName
    - spec.valuesFrom.[name=CLUSTER-microservices-demo-user-values].name
    options:
      delimiter: '-'
      index: 0
  # --- ConfigMaps from configMapGenerator ---
  - select:
      kind: ConfigMap
      name: CLUSTER-userconfig
    fieldPaths:
    - metadata.name
    - metadata.labels.[giantswarm.io/cluster]
    options:
      delimiter: '-'
      index: 0
  - select:
      kind: ConfigMap
      name: CLUSTER-gateway-api-bundle
    fieldPaths:
    - metadata.name
    options:
      delimiter: '-'
      index: 0
  - select:
      kind: ConfigMap
      name: CLUSTER-aws-lb-controller-bundle-user-values
    fieldPaths:
    - metadata.name
    options:
      delimiter: '-'
      index: 0
  - select:
      kind: ConfigMap
      name: CLUSTER-ingress-nginx-user-values
    fieldPaths:
    - metadata.name
    options:
      delimiter: '-'
      index: 0
  - select:
      kind: ConfigMap
      name: CLUSTER-kong-user-values
    fieldPaths:
    - metadata.name
    options:
      delimiter: '-'
      index: 0
  - select:
      kind: ConfigMap
      name: CLUSTER-microservices-demo-user-values
    fieldPaths:
    - metadata.name
    options:
      delimiter: '-'
      index: 0
  # --- TestRun (WC part of composite BASE_DOMAIN env) ---
  - select:
      kind: TestRun
      name: envoy-gateway-load-test
    fieldPaths:
    - spec.runner.env.[name=BASE_DOMAIN].value
    options:
      delimiter: '.'
      index: 0
